<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0f1117;--surface:rgba(255,255,255,0.05);--surface-hover:rgba(255,255,255,0.1);
  --accent:#a78bfa;--accent2:#34d399;--text:#e2e8f0;--text-muted:#475569;
  --border:rgba(255,255,255,0.1);--glow:0 0 30px rgba(167,139,250,0.2);
  --radius:16px;--font-display:'Onest',sans-serif;--font-body:'Onest',sans-serif;
}

/* ===== 11 THEMES ===== */
body.theme-aurora{--bg:#0a0e1a;--accent:#a78bfa;--accent2:#34d399;--text:#e2e8f0;--text-muted:#475569;--border:rgba(167,139,250,0.2);--glow:0 0 40px rgba(167,139,250,0.2)}
body.theme-neon{--bg:#050510;--accent:#00ffcc;--accent2:#ff00aa;--text:#e0f0ff;--text-muted:#556677;--border:rgba(0,255,204,0.2);--glow:0 0 20px rgba(0,255,204,0.4);--font-display:'Space Mono',monospace;--font-body:'Space Mono',monospace}
body.theme-luxury{--bg:#0d0b08;--accent:#d4af37;--accent2:#c9956e;--text:#f5ead8;--text-muted:#6b5a3e;--border:rgba(212,175,55,0.25);--glow:0 4px 30px rgba(212,175,55,0.15);--font-display:'Playfair Display',serif;--font-body:'Crimson Pro',serif}
body.theme-brutalist{--bg:#f0ece4;--accent:#ff2200;--accent2:#0000ff;--text:#111;--text-muted:#888;--border:#111;--glow:4px 4px 0 #111;--font-display:'Bebas Neue',sans-serif}
body.theme-terminal{--bg:#0c0c0c;--accent:#00ff46;--accent2:#00cc38;--text:#00ff46;--text-muted:#1a5c2a;--border:rgba(0,255,70,0.2);--glow:0 0 20px rgba(0,255,70,0.3);--font-display:'Share Tech Mono',monospace;--font-body:'Share Tech Mono',monospace}
body.theme-cyber{--bg:#0a0a0a;--accent:#ff2b2b;--accent2:#8c8c8c;--text:#c8c8c8;--text-muted:#3a3a3a;--border:rgba(255,43,43,0.2);--glow:0 0 18px rgba(255,43,43,0.35);--font-display:'Syne',sans-serif}
body.theme-glass{--bg:#1a1040;--accent:#e879f9;--accent2:#67e8f9;--text:#f0f4ff;--text-muted:rgba(200,210,255,0.45);--border:rgba(255,255,255,0.15);--glow:0 8px 32px rgba(232,121,249,0.2);--font-display:'Plus Jakarta Sans',sans-serif;--font-body:'Plus Jakarta Sans',sans-serif}
body.theme-liquidglass{--bg:#d8e8f5;--accent:#0071e3;--accent2:#34aadc;--text:#1d1d1f;--text-muted:rgba(29,29,31,0.45);--border:rgba(255,255,255,0.6);--glow:0 8px 32px rgba(0,113,227,0.18);--font-display:'Plus Jakarta Sans',sans-serif}
body.theme-sakura{--bg:#fdf6f0;--accent:#c0687a;--accent2:#e8a0b0;--text:#2d1a1e;--text-muted:rgba(45,26,30,0.42);--border:rgba(192,104,122,0.22);--glow:0 4px 24px rgba(192,104,122,0.18);--font-display:'Noto Serif JP',serif}
body.theme-retro80s{--bg:#0d0015;--accent:#ff00ff;--accent2:#ffee00;--text:#f0e0ff;--text-muted:rgba(220,180,255,0.4);--border:rgba(255,0,255,0.25);--glow:0 0 20px rgba(255,0,255,0.5);--font-display:'VT323',monospace}
body.theme-minimal{--bg:#f8f8f6;--accent:#111;--accent2:#888;--text:#111;--text-muted:#aaa;--border:rgba(0,0,0,0.1);--glow:none;--font-display:'Outfit',sans-serif;--font-body:'Outfit',sans-serif}

body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:env(safe-area-inset-top,40px) 20px 80px;transition:background .5s,color .5s;overflow-x:hidden}

/* ===== SEARCH ===== */
.search-wrap{width:100%;max-width:640px;margin:60px auto 0;position:relative;z-index:10}
.search-input-wrap{position:relative}
.search-box{width:100%;padding:16px 20px 16px 50px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:16px;font-family:var(--font-body);outline:none;transition:all .3s}
.search-box::placeholder{color:var(--text-muted)}
.search-box:focus{border-color:var(--accent);box-shadow:var(--glow)}
.search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}
.search-engines{display:flex;gap:6px;margin-top:10px;justify-content:center;flex-wrap:wrap}
.engine-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);font-size:11px;cursor:pointer;transition:all .2s;font-family:var(--font-body)}
.engine-btn:hover,.engine-btn.active{border-color:var(--accent);color:var(--accent);background:var(--surface-hover)}


/* ===== MACROS GRID ===== */
.macros-section{width:100%;max-width:640px;margin:30px auto 0;position:relative;z-index:5}
.macros-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted);text-align:center;margin-bottom:16px}
.macros-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px}
.macro-card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);text-decoration:none;color:var(--text);transition:all .3s cubic-bezier(.23,1,.32,1);cursor:pointer;position:relative;overflow:hidden}
.macro-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--accent),var(--accent2));transform:scaleY(0);transform-origin:bottom;transition:transform .3s}
.macro-card:hover::before{transform:scaleY(1)}
.macro-card:hover{transform:translateY(-6px);border-color:var(--accent);box-shadow:var(--glow);background:var(--surface-hover)}
.macro-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;transition:transform .3s}
.macro-card:hover .macro-icon{transform:scale(1.1) rotate(-5deg)}
.macro-icon svg{width:24px;height:24px;fill:currentColor}
.macro-name{font-size:12px;font-weight:600;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.macro-key{position:absolute;top:6px;right:8px;font-size:9px;color:var(--text-muted);opacity:.5}

/* ===== FOOTER ===== */
.footer{text-align:center;margin-top:auto;padding-top:40px;font-size:11px;color:var(--text-muted);letter-spacing:.1em}
.footer span{color:var(--accent)}

/* ===== THEME SWITCHER ===== */
.theme-toggle{position:fixed;bottom:20px;right:20px;z-index:1000;width:42px;height:42px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .3s;backdrop-filter:blur(12px)}
.theme-toggle:hover{border-color:var(--accent);box-shadow:var(--glow);transform:scale(1.1)}
.theme-panel{position:fixed;bottom:74px;right:20px;z-index:1000;background:var(--surface);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--radius);padding:10px;display:none;flex-direction:column;gap:4px;min-width:180px;box-shadow:0 20px 60px rgba(0,0,0,.4);animation:panelIn .2s ease}
.theme-panel.open{display:flex}
@keyframes panelIn{from{opacity:0;transform:translateY(8px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.theme-opt{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--text);font-size:12px;font-family:var(--font-body);transition:all .2s}
.theme-opt:hover{background:var(--surface-hover);border-color:var(--border)}
.theme-opt.active{border-color:var(--accent)}
.theme-dot{width:20px;height:20px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.15)}
.theme-label{flex:1;text-align:left}

/* ===== SETTINGS GEAR ===== */
.settings-btn{position:fixed;top:20px;right:20px;z-index:1000;width:42px;height:42px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .3s;backdrop-filter:blur(12px)}
.settings-btn:hover{border-color:var(--accent);box-shadow:var(--glow);transform:rotate(60deg)}
body.light-mode{--bg:#f5f5f7;--surface:rgba(0,0,0,0.03);--surface-hover:rgba(0,0,0,0.06);--text:#1d1d1f;--text-muted:#86868b;--border:rgba(0,0,0,0.1);--glow:0 4px 20px rgba(0,0,0,0.1)}
body.light-mode.theme-aurora{--bg:#f0f0ff;--text:#1a1a2e;--text-muted:#6c6c8a;--border:rgba(167,139,250,0.3)}
body.light-mode.theme-neon{--bg:#f0fffc;--text:#0a1a15;--text-muted:#4a6a60;--border:rgba(0,255,204,0.3)}
body.light-mode.theme-luxury{--bg:#faf8f4;--text:#2a2010;--text-muted:#8a7a5a;--border:rgba(212,175,55,0.3)}
body.light-mode.theme-terminal{--bg:#f0f0f0;--text:#0a2a10;--text-muted:#4a7a50;--border:rgba(0,180,50,0.3)}
body.light-mode.theme-cyber{--bg:#f8f8f8;--text:#1a1a1a;--text-muted:#6a6a6a;--border:rgba(255,43,43,0.3)}
body.light-mode.theme-glass{--bg:#f8f4ff;--text:#1a1030;--text-muted:#7a6a9a;--border:rgba(232,121,249,0.3)}
body.light-mode.theme-sakura{--bg:#fff8f6;--text:#2d1a1e;--text-muted:#8a6a70;--border:rgba(192,104,122,0.3)}
body.light-mode.theme-retro80s{--bg:#f8f0ff;--text:#1a0020;--text-muted:#7a5a8a;--border:rgba(255,0,255,0.3)}
body.light-mode.theme-brutalist{--bg:#f0ece4;--text:#111;--text-muted:#888;--border:#111;--glow:2px 2px 0 #111}
body.light-mode.theme-liquidglass{--bg:#e8f0f8;--text:#1d1d1f;--text-muted:rgba(29,29,31,0.5);--border:rgba(0,113,227,0.2)}
body.light-mode.theme-minimal{--bg:#ffffff;--text:#111;--text-muted:#999;--border:rgba(0,0,0,0.08)}

/* ===== MACROS MENU (CAROUSEL) ===== */
.pinned-bar{width:100%;max-width:640px;display:flex;gap:8px;overflow-x:auto;padding:8px 0;justify-content:center;flex-wrap:wrap;margin-top:10px;position:relative;z-index:5}
.pinned-bar::-webkit-scrollbar{display:none}
.pinned-pill{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:11px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .2s;white-space:nowrap}
.pinned-pill:hover{border-color:var(--accent);color:var(--accent);box-shadow:var(--glow)}
.pinned-pill .pill-icon{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px}
.pinned-pill .pill-icon svg{width:14px;height:14px;fill:currentColor}

/* ===== CLOCK ===== */
.clock{font-family:var(--font-display);font-size:clamp(42px,10vw,72px);font-weight:800;text-align:center;margin-top:20px;letter-spacing:-.04em;line-height:1;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative;z-index:5}
.clock-date{font-size:13px;color:var(--text-muted);text-align:center;margin-top:4px;letter-spacing:.08em;position:relative;z-index:5}

/* ===== RESPONSIVE ===== */
@media(min-width:1024px){
  .macros-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:16px}
  .macro-card{padding:24px 16px}
  .macro-icon{width:56px;height:56px;font-size:26px}
  .macro-name{font-size:13px}
  .search-wrap{max-width:700px}
  .pinned-pill{padding:8px 18px;font-size:12px}
}
@media(min-width:768px) and (max-width:1024px){
  .macros-grid{grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:14px}
  .search-wrap{max-width:580px}
}
@media(max-width:768px){
  body{padding:20px 14px 100px}
  .search-wrap{margin-top:30px}
  .macros-grid{grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:10px}
  .macro-card{padding:16px 8px;border-radius:14px}
  .macro-icon{width:40px;height:40px;font-size:18px;border-radius:10px}
  .macro-name{font-size:11px}
  .macro-key{display:none}
  .pinned-bar{flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;padding:8px 4px;-webkit-overflow-scrolling:touch}
  .clock{font-size:clamp(36px,12vw,56px)}
  .theme-panel{right:10px;bottom:70px}
  .theme-toggle{right:10px;bottom:16px}
  .settings-btn{right:10px;top:16px}
}
@media(max-width:374px){
  .macros-grid{grid-template-columns:repeat(3,1fr);gap:8px}
  .macro-card{padding:12px 6px;border-radius:12px}
  .macro-icon{width:36px;height:36px;font-size:16px}
  .macro-name{font-size:10px}
  .search-box{font-size:15px;padding:14px 16px 14px 44px}
  .clock{font-size:40px}
}
@media(orientation:landscape) and (max-height:500px){
  .search-wrap{margin-top:10px}
  .macros-grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px}
  .macro-card{padding:10px 6px}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
</style>
</head>

// ===== ENGINES =====
const ENGINES = [
  {name:'Google',url:'https://www.google.com/search?q='},
  {name:'DuckDuckGo',url:'https://duckduckgo.com/?q='},
  {name:'Bing',url:'https://www.bing.com/search?q='},
  {name:'YouTube',url:'https://www.youtube.com/results?search_query='},
  {name:'Wikipedia',url:'https://www.wikipedia.org/w/index.php?search='},
];

// ===== THEMES =====
const THEMES = [
  {id:'aurora',name:'Aurora',desc:'Ungu · Hijau',grad:'linear-gradient(135deg,#a78bfa,#34d399)'},
  {id:'neon',name:'Neon',desc:'Cyan · Pink',grad:'linear-gradient(135deg,#00ffcc,#ff00aa)'},
  {id:'luxury',name:'Luxury',desc:'Emas · Serif',grad:'linear-gradient(135deg,#d4af37,#c9956e)'},
  {id:'brutalist',name:'Brutalist',desc:'Merah · Kasar',grad:'linear-gradient(135deg,#ff2200,#ffe600)'},
  {id:'terminal',name:'Terminal',desc:'CRT · Matrix',grad:'#0c0c0c'},
  {id:'cyber',name:'Cyber',desc:'Merah · Gritty',grad:'linear-gradient(135deg,#ff8c00,#ffcc00)'},
  {id:'glass',name:'Glass',desc:'Kaca · Pastel',grad:'linear-gradient(135deg,rgba(232,121,249,.8),rgba(103,232,249,.8))'},
  {id:'liquidglass',name:'Liquid Glass',desc:'Cair · iOS',grad:'linear-gradient(135deg,rgba(180,220,255,.9),rgba(200,180,255,.8))'},
  {id:'sakura',name:'Sakura',desc:'Jepun · Lembut',grad:'linear-gradient(135deg,#ffb6c8,#fde8ee)'},
  {id:'retro80s',name:'Retro 80s',desc:'Synthwave · Grid',grad:'linear-gradient(135deg,#ff00ff,#ffee00)'},
  {id:'minimal',name:'Minimal',desc:'Bersih · Swiss',grad:'#f8f8f6'},
];

let activeEngine = 0;
let activeTheme = localStorage.getItem('chevron-theme') || 'aurora';
let isLightMode = localStorage.getItem('chevron-light') === 'true';

// ===== INIT =====
function init(){
  renderMacros();
  renderPinned();
  renderEngines();
  renderThemes();
  setTheme(activeTheme);
  applyLightMode();
  startClock();
  setupSearch();
  setupKeyboard();
  setupSettingsBtn();
}

// ===== LIGHT MODE =====
function applyLightMode(){
  if(isLightMode){
    document.body.classList.add('light-mode');
  }else{
    document.body.classList.remove('light-mode');
  }
  updateSettingsBtnIcon();
}
function toggleLightMode(){
  isLightMode=!isLightMode;
  localStorage.setItem('chevron-light',isLightMode);
  applyLightMode();
}
function updateSettingsBtnIcon(){
  const btn=document.getElementById('settingsBtn');
  btn.innerHTML=isLightMode?'☀️':'🌙';
  btn.title=isLightMode?'Mod Terang':'Mod Gelap';
}
function setupSettingsBtn(){
  document.getElementById('settingsBtn').addEventListener('click',toggleLightMode);
}

// ===== MACROS =====
function renderMacros(){
  const grid = document.getElementById('macrosGrid');
  grid.innerHTML = MACROS.map((m,i)=>`
    <a class="macro-card" href="${m.url}" target="_blank" title="${m.triggers[0]}" style="animation-delay:${i*0.04}s">
      <div class="macro-icon" style="background:linear-gradient(135deg,${m.color},${m.color2})">${m.icon}</div>
      <div class="macro-name">${m.name}</div>
      ${m.key?'<div class="macro-key">'+m.key.replace('Key','')+'</div>':''}
    </a>
  `).join('');
}

function renderPinned(){
  const bar = document.getElementById('pinnedBar');
  const pinned = MACROS.filter(m=>m.pinned);
  bar.innerHTML = pinned.map(m=>`
    <a class="pinned-pill" href="${m.url}" target="_blank">
      <span class="pill-icon" style="background:linear-gradient(135deg,${m.color},${m.color2})">${m.icon}</span>
      ${m.name}
    </a>
  `).join('');
}

// ===== ENGINES =====
function renderEngines(){
  const el = document.getElementById('engines');
  el.innerHTML = ENGINES.map((e,i)=>`
    <button class="engine-btn${i===activeEngine?' active':''}" onclick="setEngine(${i})">${e.name}</button>
  `).join('');
}
function setEngine(i){
  activeEngine=i;
  renderEngines();
  document.getElementById('searchBox').focus();
}

// ===== THEMES =====
function renderThemes(){
  const panel = document.getElementById('themePanel');
  panel.innerHTML = THEMES.map(t=>`
    <div class="theme-opt${t.id===activeTheme?' active':''}" onclick="setTheme('${t.id}')">
      <div class="theme-dot" style="background:${t.grad};${t.id==='terminal'?'border:1px solid #00ff46':''}"></div>
      <div class="theme-label">${t.name}<br><span style="font-size:10px;opacity:.5">${t.desc}</span></div>
    </div>
  `).join('');
}
function setTheme(id){
  activeTheme=id;
  document.body.className='theme-'+id;
  localStorage.setItem('chevron-theme',id);
  renderThemes();
}
document.getElementById('themeToggle').addEventListener('click',()=>{
  document.getElementById('themePanel').classList.toggle('open');
});
document.addEventListener('click',(e)=>{
  if(!e.target.closest('#themePanel')&&!e.target.closest('#themeToggle')){
    document.getElementById('themePanel').classList.remove('open');
  }
});

// ===== CLOCK =====
function startClock(){
  const update=()=>{
    const now=new Date();
    const h=String(now.getHours()).padStart(2,'0');
    const m=String(now.getMinutes()).padStart(2,'0');
    document.getElementById('clock').textContent=h+':'+m;
    const days=['Ahad','Isnin','Selasa','Rabu','Khamis','Jumaat','Sabtu'];
    const months=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ogo','Sep','Okt','Nov','Dis'];
    document.getElementById('clockDate').textContent=days[now.getDay()]+', '+now.getDate()+' '+months[now.getMonth()]+' '+now.getFullYear();
  };
  update();
  setInterval(update,10000);
}

// ===== SEARCH =====
function setupSearch(){
  const box=document.getElementById('searchBox');
  box.addEventListener('input',()=>{});
  box.addEventListener('keydown',(e)=>{
    if(e.key==='Enter'){
      const q=box.value.trim();
      if(!q)return;
      const macro=findMacro(q);
      if(macro){
        window.open(macro.url,'_blank');
      }else{
        window.open(ENGINES[activeEngine].url+encodeURIComponent(q),'_blank');
      }
      box.value='';
    }
  });
}

function findMacro(q){
  const lower=q.toLowerCase();
  for(const m of MACROS){
    for(const t of m.triggers){
      if(lower===t||lower.startsWith(t+' ')||lower.startsWith(t+'?')||lower.startsWith(t+'/')){
        return m;
      }
    }
  }
  return null;
}

// ===== KEYBOARD =====
function setupKeyboard(){
  document.addEventListener('keydown',(e)=>{
    if(e.target.tagName==='INPUT')return;
    if(e.key==='/'){
      e.preventDefault();
      document.getElementById('searchBox').focus();
    }
  });
  MACROS.filter(m=>m.key&&m.pinned).forEach(m=>{
    document.addEventListener('keydown',(e)=>{
      if(e.target.tagName==='INPUT')return;
      if(e.code===m.key&&e.shiftKey){
        e.preventDefault();
        window.open(m.url,'_blank');
      }
    });
  });
}

init();
</script>
